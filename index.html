<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop quần áo Mixi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SHOP QUẦN ÁO MIXI</h1>
        
        <div class="header-right" style="display: flex; align-items: center; gap: 20px;">
            <div id="user-info-area">
                </div>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 Giỏ hàng (<span id="cart-count">0</span>)
            </div>
        </div>
    </header>

    <main>
        <section class="products" id="products-grid"></section>
    </main>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleCart()">&times;</span>
            <h2 style="text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">Giỏ hàng</h2>
            <div id="cart-items"></div>
            <div class="cart-summary">
                <div class="total-row">
                    <span>Tổng cộng:</span>
                    <span id="total-price" class="total-amount">0</span><span class="total-amount">đ</span>
                </div>
                <button class="btn-checkout" onclick="checkout()">THANH TOÁN NGAY</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close" onclick="toggleAuthModal()">&times;</span>
            

    <div id="login-form-panel">
        <h2 style="text-align: center;">Đăng Nhập</h2>
        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="text" id="login-phone" placeholder="Số điện thoại" 
               onkeydown="moveToNextInput(event, 'login-password')"
               style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        
            <input type="password" id="login-password" placeholder="Mật khẩu" 
               onkeydown="submitOnEnter(event)"
               style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
               
            <button class="btn-add" onclick="handleLogin()">ĐĂNG NHẬP</button>
            <p style="text-align: center; font-size: 14px;">Chưa có tài khoản? <a href="#" onclick="switchAuthPanel('register')" style="color:#27ae60; font-weight:bold;">Đăng ký ngay</a></p>
        </div>
    </div>


    <div id="register-form-panel" style="display: none;">
        <h2 style="text-align: center;">Đăng Ký Tài Khoản</h2>
        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="text" id="reg-name" placeholder="Họ và tên của bạn" 
               onkeydown="moveToNextInput(event, 'reg-phone')"
               style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
               
            <input type="text" id="reg-phone" placeholder="Số điện thoại" 
               onkeydown="moveToNextInput(event, 'reg-password')"
               style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
               
            <input type="password" id="reg-password" placeholder="Mật khẩu" 
               onkeydown="if(event.key === 'Enter') { event.preventDefault(); handleRegister(); }"
               style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
               
        <button class="btn-add" onclick="handleRegister()" style="background:#2c3e50;">ĐĂNG KÝ</button>
        <p style="text-align: center; font-size: 14px;">Đã có tài khoản? <a href="#" onclick="switchAuthPanel('login')" style="color:#2c3e50; font-weight:bold;">Đăng nhập</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
